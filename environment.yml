name: hemobind
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - openmm=8.1.1
  - pdbfixer
  - rdkit
  - mdanalysis
  - prolif
  - pyside6
  - pyyaml
  - python-dotenv
  - matplotlib
  - seaborn
  - pandas
  - pip
  - pip:
      - pyqtdarktheme
      - pyqtgraph
      - openmmforcefields
      - git+https://github.com/openforcefield/openff-toolkit.git
